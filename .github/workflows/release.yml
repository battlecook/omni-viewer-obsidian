name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches plugin version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"

          if ! echo "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag version ($TAG_VERSION) must be plain semver, for example 0.1.0."
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest.json version ($MANIFEST_VERSION)."
            exit 1
          fi

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        run: |
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {
              in_section = 1
              next
            }
            /^## \[/ && in_section {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section found for version $VERSION."
            echo "Expected heading: ## [$VERSION] - YYYY-MM-DD"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            main.js
            manifest.json
            styles.css
          draft: false
          prerelease: false
